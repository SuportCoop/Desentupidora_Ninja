{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <!-- Adicionando Bootstrap para estilização rápida -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Cadastro de Cliente</h4>
        </div>
        <div class="card-body">
            <!-- Formulário -->
            <form method="POST" action="">
                <!-- Token CSRF seria necessário se usado diretamente no Django: {% csrf_token %} -->
                
                <h5 class="mb-3 border-bottom pb-2">Dados Principais</h5>
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label for="tipo" class="form-label">Tipo de Pessoa *</label>
                        <select class="form-select" id="tipo" name="tipo">
                            <option value="PF" selected>Pessoa Física</option>
                            <option value="PJ">Pessoa Jurídica</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="documento" class="form-label">CPF/CNPJ *</label>
                        <input type="text" class="form-control" onchange="BuscarCNPJ()" id="documento" name="documento" maxlength="20" required>
                    </div>
                    <div class="col-md-6">
                        <label for="nome" class="form-label">Nome / Razão Social *</label>
                        <input type="text" class="form-control" id="nome" name="nome" maxlength="200" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                    <div class="col-md-6">
                        <label for="telefone" class="form-label">Telefone *</label>
                        <input type="tel" class="form-control" id="telefone" name="telefone" maxlength="20" required>
                    </div>
                </div>

                <h5 class="mb-3 border-bottom pb-2">Endereço</h5>
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label for="cep" class="form-label">CEP *</label>
                        <input type="text" class="form-control" onchange="initCepBusca()" id="cep" name="cep" maxlength="9" required>
                    </div>
                    <div class="col-md-7">
                        <label for="endereco" class="form-label">Endereço</label>
                        <input type="text" class="form-control" id="endereco" name="endereco" maxlength="255">
                    </div>
                    <div class="col-md-2">
                        <label for="numero" class="form-label">Número</label>
                        <input type="text" class="form-control" id="numero" name="numero" maxlength="20">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-5">
                        <label for="bairro" class="form-label">Bairro</label>
                        <input type="text" class="form-control" id="bairro" name="bairro" maxlength="100">
                    </div>
                    <div class="col-md-5">
                        <label for="cidade" class="form-label">Cidade</label>
                        <input type="text" class="form-control" id="cidade" name="cidade" maxlength="100">
                    </div>
                    <div class="col-md-2">
                        <label for="uf" class="form-label">UF</label>
                        <input type="text" class="form-control" id="uf" name="uf" maxlength="2">
                    </div>
                </div>

                <h5 class="mb-3 border-bottom pb-2">Informações do Contrato</h5>
                <div class="row mb-4 align-items-center">
                    <div class="col-md-4">
                        <label for="data_inicio" class="form-label">Data de Início *</label>
                        <!-- Type "date" abre o calendário automático no navegador -->
                        <input type="date" class="form-control" id="data_inicio" name="data_inicio" required>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check mt-md-4">
                            <input class="form-check-input" type="checkbox" id="contrato_assinado" name="contrato_assinado">
                            <label class="form-check-label" for="contrato_assinado">
                                Contrato Assinado?
                            </label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check mt-md-4">
                            <!-- O default no seu model é True, então já deixamos 'checked' no HTML -->
                            <input class="form-check-input" type="checkbox" id="ativo" name="ativo" checked>
                            <label class="form-check-label" for="ativo">
                                Ativo?
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="d-flex justify-content-end gap-2">
                    <button type="reset" class="btn btn-secondary">Limpar</button>
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="js/buscar_cnpj.js"></script>
</body>
</html>
